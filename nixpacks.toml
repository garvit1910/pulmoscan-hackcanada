# Railway / Nixpacks config — tells Railway this is a Python backend
[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["pip install -r backend/requirements.txt"]

# Provide defaults so Nixpacks doesn't require them as build-time secrets
[variables]
OUTPUT_DIR = "/app/ml/output"
OSIC_DATA_ROOT = "/app/data/osic/train"
FRONTEND_URL = ""

[start]
cmd = "uvicorn backend.server:app --host 0.0.0.0 --port ${PORT:-8000}"
